<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Offline · Theta Gainers</title>
    <style>
      body { background:#0b0d12; color:#e7eaf0; font-family:system-ui; display:grid; place-items:center; min-height:100vh; margin:0; text-align:center; padding:1rem; }
      h1 { font-size:1.5rem; } p { color:#8a94a7; max-width:320px; }
      button { margin-top:1rem; background:#5b9dff; color:white; border:0; padding:.6rem 1.2rem; border-radius:8px; font-size:.9rem; cursor:pointer; }
    </style>
  </head>
  <body>
    <div>
      <h1>⚡ You're offline</h1>
      <p>Trading requires a live connection. Reconnect and try again. Already-placed orders continue on the server — nothing is lost.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
