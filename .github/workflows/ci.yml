name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env: {POSTGRES_USER: navin, POSTGRES_PASSWORD: navin, POSTGRES_DB: navin_algo}
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U navin"
          --health-interval=5s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping" --health-interval=5s
    defaults:
      run: {working-directory: backend}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install uv
      - run: uv sync --all-extras
      - name: ruff
        run: uv run ruff check app tests
      - name: mypy
        run: uv run mypy app
      - name: alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://navin:navin@localhost:5432/navin_algo
        run: uv run alembic upgrade head
      - name: pytest
        env:
          DATABASE_URL: postgresql+asyncpg://navin:navin@localhost:5432/navin_algo
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  frontend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run: {working-directory: frontend}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://algo.thetagainers.in

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: pip-audit
        run: |
          pip install pip-audit
          cd backend && pip-audit --desc || true   # warn only; don't block
      - name: npm audit
        run: cd frontend && npm audit --audit-level=high || true

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-south-1
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build & push API image
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t ${{ steps.ecr.outputs.registry }}/theta-gainers-api:$TAG ./backend
          docker push ${{ steps.ecr.outputs.registry }}/theta-gainers-api:$TAG
      - name: Build & push Web image
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t ${{ steps.ecr.outputs.registry }}/theta-gainers-web:$TAG ./frontend
          docker push ${{ steps.ecr.outputs.registry }}/theta-gainers-web:$TAG
